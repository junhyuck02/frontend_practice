    function MinutesToHours() {
      const [amount, setAmount] = React.useState("");
      // 해당 데이터의 초기값을 useState()안의 값으로 설정하겠다
      const [inverted, setInverted] = React.useState(false);
      const onChange = (event) => {
        setAmount(event.target.value);
      };
      const reset = () => setAmount("");
      const onInvert = () => {
        reset();
        setInverted((current) => !current);
      };
      return (
        <div>
          <div>
            <lable htmlFor="minutes">Minutes</lable>
            <input
              value={inverted ? amount * 60 : amount}
              id="minutes"
              placeholder="Minutes"
              type="number"
              onChange={onChange}
              disabled={inverted === true}
            />
          </div>

          <div>
            <lable htmlFor="hours">Hours</lable>
            <input
              value={inverted ? amount : amount / 60}
              id="hours"
              placeholder="Hours"
              type="number"
              disabled={inverted === false}
              onChange={onChange}
            />
          </div>
          <button onClick={reset}>Reset</button>
          <button onClick={onInvert}>
            {inverted ? "Turn back" : "Invert"}
          </button>
        </div>
      );
    }
    function KmToMiles() {
      const [amount, setAmount] = React.useState("");
      const [inverted, setInverted] = React.useState(false);
      const onChange = (event) => {
        setAmount(event.target.value);
      };
      const reset = () => setAmount("");
      const onInvert = () => {
        reset();
        setInverted((current) => !current);
      };
      return (
        <div>
          <div>
            <lable htmlFor="kilometers">Kilometers</lable>
            <input
              value={inverted ? amount * 1.609 : amount}
              id="kilometers"
              placeholder="kilometers"
              type="number"
              onChange={onChange}
              disabled={inverted === true}
            />
          </div>

          <div>
            <lable htmlFor="miles">Miles</lable>
            <input
              value={inverted ? amount : amount / 1.609}
              id="miles"
              placeholder="Miles"
              type="number"
              disabled={inverted === false}
              onChange={onChange}
            />
          </div>
          <button onClick={reset}>Reset</button>
          <button onClick={onInvert}>
            {inverted ? "Turn back" : "Invert"}
          </button>
        </div>
      );
    }

    function App() {
      const [index, setIndex] = React.useState("xx");
      const onSelect = (event) => {
        setIndex(event.target.value);
      };
      return (
        <div>
          <h1 className="hi">Super Converter</h1>
          <select value={index} onChange={onSelect}>
            <option value="xx">Select your units</option>
            <option value="0">Minutes & Hours</option>
            <option value="1">Km & Miles</option>
          </select>
          <hr />
          {index === "xx" ? "Please select your units" : null}
          {index === "0" ? <MinutesToHours /> : null}
          {index === "1" ? <KmToMiles /> : null}
        </div>
      );
    }
    const root = document.getElementById("root");
    ReactDOM.render(<App />, root);
